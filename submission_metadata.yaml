ai_usage_summary: |
  Used Antigravity AI coding assistant for system architecture design, debugging Powershell path wildcards, and coding the React/FastAPI recruiter dashboard. No candidate profile data was fed to external APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A 4-stage hybrid scoring model combining local SentenceTransformer semantic similarity with heuristic multipliers (YoE targets, product pedigree bonus, location preference, and notice period bounds) and behavioral availability modifiers. Includes a custom undergraduate timeline scanner to eliminate honeypots (0% honeypot rate in Top 100), and a deterministic hash-based reasoning generator to supply high-quality, varied justifications for manual review.

